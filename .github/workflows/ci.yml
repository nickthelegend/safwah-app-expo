name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: jest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # Pin npm to the version that generated the lockfile — npm patch releases
      # validate nested lock resolutions (e.g. cross-fetch 3.x + 4.x) differently.
      - run: npm install -g npm@11.11.1
      - run: npm ci
      - name: Jest (format · explorer · analytics · activity · api client)
        run: npm test
